name: Build Debug APK

# این ورک‌فلو با هر Push به شاخه‌ی main یا master، یا به‌صورت دستی از تب Actions اجرا می‌شود
# فرض این ورک‌فلو: فایل StoryBookApp.zip (همین فایلی که دریافت کرده‌اید) مستقیماً
# در ریشه‌ی ریپازیتوری آپلود شده است (بدون اکسترکت‌کردن دستی).
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت کد پروژه
        uses: actions/checkout@v4

      - name: استخراج فایل zip پروژه
        run: unzip -o StoryBookApp.zip

      - name: نصب Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: ساخت APK دیباگ
        working-directory: StoryBookApp
        run: gradle assembleDebug --stacktrace

      - name: آپلود APK به‌عنوان خروجی (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: StoryBookApp-debug-apk
          path: StoryBookApp/app/build/outputs/apk/debug/app-debug.apk
          
